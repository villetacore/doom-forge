<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0a23a"/>
      <stop offset="1" stop-color="#e2603a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#e2603a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e2603a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="0.5" stop-color="#f0a23a"/>
      <stop offset="1" stop-color="#e2603a"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="#0e0d0c"/>
  <rect width="1200" height="320" fill="url(#glow)"/>
  <rect x="0" y="316" width="1200" height="4" fill="url(#ember)"/>

  <!-- demon skull mark -->
  <g transform="translate(120,160) scale(2.0)">
    <path d="M-11 -10c-5-2-9-6-10-12 5 1 9 3 12 7M11 -10c5-2 9-6 10-12-5 1-9 3-12 7"
          fill="none" stroke="#f0a23a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0 -18c-9 0-15 6-15 15 0 5 2 8 5 11l1 7 4-2 5 2 5-2 4 2 1-7c3-3 5-6 5-11 0-9-6-15-15-15Z"
          fill="#16140f" stroke="url(#ember)" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M-10 -2l8 3-2 5-7-3z" fill="url(#eye)"/>
    <path d="M10 -2l-8 3 2 5 7-3z" fill="url(#eye)"/>
    <path d="M-2 8h4l-2 5zM-5 12l2 5M5 12l-2 5M0 13l0 5"
          stroke="#f0a23a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="150" font-size="74" font-weight="800" letter-spacing="6">
    <tspan fill="#ece4d8">DOOM</tspan><tspan fill="#f0a23a">FORGE</tspan>
  </text>
  <text x="244" y="196" font-size="22" letter-spacing="3" fill="#b6aa99">
    A modern launcher &amp; mod manager for GZDoom
  </text>

  <!-- palette showcase dots -->
  <g transform="translate(246,236)">
    <circle cx="10"  cy="10" r="10" fill="#e2603a"/>
    <circle cx="40"  cy="10" r="10" fill="#9b6cff"/>
    <circle cx="70"  cy="10" r="10" fill="#4caf50"/>
    <circle cx="100" cy="10" r="10" fill="#3a8ee2"/>
    <circle cx="130" cy="10" r="10" fill="#d23f3f"/>
    <circle cx="160" cy="10" r="10" fill="#d9a227"/>
    <circle cx="190" cy="10" r="10" fill="#4666e0"/>
    <circle cx="220" cy="10" r="10" fill="#1fae8e"/>
    <circle cx="250" cy="10" r="10" fill="#d6359b"/>
    <circle cx="280" cy="10" r="10" fill="#6c7a92"/>
    <text x="306" y="15" font-size="13" letter-spacing="1" fill="#897c6a">10 ACCENT PALETTES &#183; DARK / LIGHT / AMOLED</text>
  </g>
</svg>
